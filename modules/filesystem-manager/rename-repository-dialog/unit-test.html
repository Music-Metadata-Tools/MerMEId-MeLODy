<!DOCTYPE html>

<html>

<head>
    <title>Add repository dialog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.cdnfonts.com/css/palatino-linotype" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.17.1/cdn/themes/light.css" />
</head>

<body>
    <header>
        <h1 class="title">Add repository dialog</h1>
    </header>
    <main>
        <cdmd-add-repository-dialog></cdmd-add-repository-dialog>
    </main>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.17.1/cdn/shoelace.js"></script>
    <script type="module" src="https://unpkg.com/@isomorphic-git/lightning-fs"></script>
    <script type="module" src="index.js"></script>
    <script type="module">
        import LocalGitLabRepo from "../LocalGitLabRepo.js";
        let gitlab_client = new LocalGitLabRepo();

        let dialog = document.querySelector("cdmd-add-repository-dialog");
        dialog.repository_names = ["a"];
        dialog.show();

        document.addEventListener("cdmd-filesystem-manager:repository-branches", async (event) => {
            let repository_url = event.detail;
            let branches = await gitlab_client.list_branches(repository_url);

            dialog.repository_branches = branches;
        });

        document.addEventListener("cdmd-filesystem-manager:repository-to-add", async (event) => {
            let repository_metadata = event.detail;
            console.log(repository_metadata);
        });
    </script>
</body>

</html>
