<!DOCTYPE html>

<html>

<head>
    <title>MerMEId MeLOD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.cdnfonts.com/css/palatino-linotype" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.17.1/cdn/themes/light.css" />
    <link href="css/index.css" rel="stylesheet" />
</head>

<body>
    <header>
        <h1 class="title">MerMEId MeLOD</h1>
    </header>
    <main>
        <nav id="filesystem-nav">
            <adwlm-filesystem-manager></adwlm-filesystem-manager>
        </nav>
        <section>
            <adwlm-entity-editor></adwlm-entity-editor>
        </section>
        <section>
            <fieldset id="shacl-rdf-output">
                <legend>RDF output generated by the form</legend>
                <pre></pre>
            </fieldset>
        </section>
    </main>
    <footer>
        <section>
            <div>Center for Digital Music Documentation (CDMD)</div>
        </section>
    </footer>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.17.1/cdn/shoelace.js"></script>
    <script type="module">
        await Promise.allSettled([
            customElements.whenDefined("sl-tab-group"),
            customElements.whenDefined("sl-tab"),
            customElements.whenDefined("sl-tab-panel"),
        ]);
        document.body.classList.add("ready");
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ulb-darmstadt/shacl-form/dist/form-default.js"></script>
    <script type="module" src="https://unpkg.com/@isomorphic-git/lightning-fs"></script>
    <script type="module" src="js/index.js"></script>
    <script type="module" src="modules/filesystem-manager/index.js"></script>
    <script type="module" src="modules/entity-editor/index.js"></script>
</body>

</html>
