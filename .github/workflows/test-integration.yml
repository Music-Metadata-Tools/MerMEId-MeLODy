name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or PR ref to test (e.g. main, refs/pull/42/head)'
        required: true
        default: 'main'

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npx vitest run tests/integration-git.test.js tests/integration-repo-data.test.js
        env:
          GIT_TOKEN: ${{ secrets.TEST_GITHUB_TOKEN }}
          GIT_USERNAME: ${{ secrets.TEST_GITHUB_USERNAME }}
          TEST_REPO_URL: ${{ secrets.TEST_REPO_URL }}
